name: health_tracker
description: "Personal Health Tracker — calories, macros, water, medicines"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: ^0.4.7
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  path_provider: ^2.1.5
  path: ^1.9.1
  provider: ^6.1.4
  fl_chart: ^0.70.2
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.1
  http: ^1.6.0
  file_picker: ^8.1.7
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env

  fonts:
    - family: DMSans
      fonts:
        - asset: fonts/DMSans-Regular.ttf
        - asset: fonts/DMSans-Medium.ttf
          weight: 500
        - asset: fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: fonts/DMSans-Bold.ttf
          weight: 700
        - asset: fonts/DMSans-ExtraBold.ttf
          weight: 800
    - family: DMSerifDisplay
      fonts:
        - asset: fonts/DMSerifDisplay-Regular.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "to-be-pfp.jpg"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "to-be-pfp.jpg"
  windows:
    generate: true
    image_path: "to-be-pfp.jpg"
    icon_size: 48
